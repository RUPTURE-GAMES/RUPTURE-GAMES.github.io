<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RUPTURE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- TOP BAR -->
<header class="top">
    <div class="logo" onclick="goHome()">RUPTURE</div>
    <button class="search-btn" onclick="openSearch()">Search</button>
</header>

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- HOME -->
<section id="home" class="screen active">
    <div class="feature-card" onclick="openProject()">
        <div class="visual-placeholder">Set Your Cover Image Here</div>
        <h1>PROJECT: RAVEN</h1>
        <span>Animated Series</span>
    </div>
</section>

<!-- PROJECT -->
<section id="project" class="screen">
    <div class="project-layout">
        <div class="project-info">
            <h1>PROJECT: RAVEN</h1>
            <p>Year: 2028</p>
            <p>Status: In Development</p>
            <p>Format: Animated Series</p>

            <div class="project-actions">
                <button disabled>Player in Development</button>
            </div>
        </div>

        <div class="project-visual">
            <div class="visual-placeholder">Set Your Poster Here</div>
        </div>
    </div>
</section>

<!-- SEARCH -->
<section id="searchScreen" class="screen">
    <div class="search-screen">
        <input id="searchInput" placeholder="Type to search">
        <div id="results"></div>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
